data:
  source_path: data/twd_tom/debug/game_001_060.jsonl
  split_by_game_id: true
  val_ratio: 0.2
  seed: 42
  batch_size: 16
  num_workers: 0
  shuffle_train: true
model:
  backbone_type: transformer
  use_observer_id: false
  num_players: 7
  d_model: 128
  n_head: 4
  n_layer: 2
  dropout: 0.1
  max_seq_len: 256
  max_day: 10
loss:
  supervision_mode: last
  bce_weight: 1.0
  cardinality_weight: 0.05
  num_wolves: 2.0
  region_weight: 0.0
train:
  epochs: 12
  learning_rate: 0.0003
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  log_every_steps: 10
  eval_every_epochs: 1
  save_every_epochs: 1
checkpoint:
  output_dir: checkpoints/twd_tom_v05/wo_observer_id_game_001_060
  save_best: true
  monitor_metric: eval_loss
  mode: min
metrics:
  binary_threshold: 0.5
notes:
  version: TWD-ToM V0.5
  description: Observer-conditioned row-wise TWD-ToM.
