schema_version: train.v1
data:
  train_paths: [data/game_001/game_001.samples.jsonl]
  valid_paths: [data/game_002/game_002.samples.jsonl]
  task: second_order
  mode: wolf_conditioned
  include_first_order_private: true
model:
  architecture: gpt2block
  d_model: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  max_events: 512
  max_day: 32
  use_target_embedding: true
training:
  epochs: 20
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.01
  seed: 20260716
  device: auto
  output_dir: artifacts/tom/second_order_wolf
