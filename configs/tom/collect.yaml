schema_version: runtime.v1
seed: 20260716
games: 1
max_steps: 256
backends:
  deepseek:
    type: openai_compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-chat
parser:
  backend: deepseek
  model: deepseek-chat
guess:
  backend: deepseek
  model: deepseek-chat
agents:
  profiles:
    gameplay:
      agent_type: deepseek
      backend: deepseek
      model: deepseek-chat
      temperature: 0.7
      strategy: {}
  werewolf_profile: gameplay
  village_profile: gameplay
environment:
  n_player: 7
  n_role: 4
  n_werewolf: 2
  n_seer: 1
  n_witch: 1
  n_guard: 0
  n_hunter: 0
  n_villager: 3
  werewolf_reward: 1
  village_reward: 1
output:
  samples: data/game_001/game_001.samples.jsonl
  failures: data/game_001/game_001.failures.jsonl
  logs: logs/game_001
  overwrite: false
