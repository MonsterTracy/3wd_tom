backends:
  deepseek:
    type: openai_compatible
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"

parser:
  backend: deepseek
  model: "deepseek-v4-flash"
  model_params:
    temperature: 0.0

env_config:
  n_player: 7
  n_role: 4
  n_werewolf: 2
  n_seer: 1
  n_guard: 0
  n_witch: 1
  n_hunter: 0
  n_villager: 3

agent_config:
  must_include: []

  all_candidates:
    - profile_name: deepseek_agent_1
      agent_type: deepseek
      backend: deepseek
      model: "deepseek-v4-flash"
      model_params:
        temperature: 1.0
      sample_ratio: 1.0

    - profile_name: deepseek_agent_2
